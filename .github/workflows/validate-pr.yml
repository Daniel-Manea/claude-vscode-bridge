name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  version-and-changelog:
    name: Require version bump + CHANGELOG entry
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'no-release') && !contains(github.event.pull_request.labels.*.name, 'automated')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare package.json version vs main
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          MAIN=$(git show "origin/main:package.json" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "main=$MAIN" >> "$GITHUB_OUTPUT"

          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "::error::package.json version is missing."
            exit 1
          fi

          if [ "$CURRENT" = "$MAIN" ]; then
            {
              echo "## Validation Failed"
              echo ""
              echo "\`package.json\` version was not bumped (still \`$CURRENT\`)."
              echo ""
              echo "Either bump the version following [semver](https://semver.org/), or apply the \`no-release\` label if this PR is intentionally non-shipping."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Require CHANGELOG entry for new version
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          # Accept either '## 3.2.12' or '## [3.2.12]' style headings.
          if ! grep -E "^## (\[)?${VERSION}(\])?( |$)" CHANGELOG.md > /dev/null; then
            {
              echo "## Validation Failed"
              echo ""
              echo "No \`## ${VERSION}\` section found in CHANGELOG.md."
              echo ""
              echo "Add a section documenting Added / Changed / Fixed / Removed for this version. The Release notes use the PR body, but the CHANGELOG remains the long-form history."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Found CHANGELOG entry for $VERSION"
