name: "Step: Release"

on:
  workflow_call:

jobs:
  run:
    name: Build, release, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: detect
        run: |
          NEW=$(jq -r .version package.json)
          OLD=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::version changed: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::version unchanged ($NEW) — skipping release"
          fi

      - name: Verify VSCE_PAT secret is set
        if: steps.detect.outputs.changed == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set. Add it via 'gh secret set VSCE_PAT' (Azure DevOps PAT for vsce publish)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.changed == 'true'
        run: npm install

      - name: Build VSIX
        if: steps.detect.outputs.changed == 'true'
        run: npm run package

      - name: Find merged pull request
        id: pr
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '(?<=Merge pull request #)\d+' || echo "$COMMIT_MSG" | grep -oP '(?<=\(#)\d+(?=\))' || true)

          if [ -n "$PR_NUMBER" ]; then
            gh pr view "$PR_NUMBER" --json body --jq '.body' > /tmp/pr-body.md
            PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          else
            echo "" > /tmp/pr-body.md
          fi

      - name: Create GitHub Release with VSIX asset
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          VERSION: ${{ steps.detect.outputs.new }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::notice::Tag $TAG already exists — skipping"
            exit 0
          fi

          cp /tmp/pr-body.md /tmp/release-body.md
          if [ -n "$PR_URL" ]; then
            printf '\n---\nReleased via [PR #%s](%s)\n' "$PR_NUMBER" "$PR_URL" >> /tmp/release-body.md
          fi

          VSIX="claude-vscode-bridge-${VERSION}.vsix"
          if [ ! -f "$VSIX" ]; then
            echo "::error::Built VSIX not found at $VSIX"
            exit 1
          fi

          gh release create "$TAG" \
            --title "v$VERSION" \
            --notes-file /tmp/release-body.md \
            --target "${{ github.sha }}" \
            "$VSIX"

          echo "::notice::Created release v$VERSION with $VSIX"

      - name: Publish to VS Code Marketplace
        if: steps.detect.outputs.changed == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "claude-vscode-bridge-${{ steps.detect.outputs.new }}.vsix"
